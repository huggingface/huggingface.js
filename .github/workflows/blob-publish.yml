name: Blob - Version and Release

on:
  workflow_dispatch:
    inputs:
      newversion:
        type: choice
        description: "Semantic Version Bump Type"
        default: patch
        options:
          - patch
          - minor
          - major

concurrency:
  group: "push-to-main"

defaults:
  run:
    working-directory: packages/blob

permissions:
  contents: write
  id-token: write
  packages: write

jobs:
  version_and_release:
    runs-on:
      group: aws-general-8-plus
    steps:
      - uses: actions/checkout@v5
        with:
          # Needed to push the tag and the commit on the main branch, otherwise we get:
          # > Run git push --follow-tags
          # remote: error: GH006: Protected branch update failed for refs/heads/main.
          # remote: error: Changes must be made through a pull request. Required status check "lint" is expected.
          token: ${{ secrets.BOT_ACCESS_TOKEN }}
      - uses: huggingface/hf-workflows/.github/actions/setup-hf-registry-proxies@21845492ef47d4e46b07a3b2a6e14fd4748c39cc
      - name: Restore pnpm lifecycle scripts (prepare/prepublishOnly needed for publish)
        # The proxy setup sets ignore-scripts=true in ~/.npmrc as a supply-chain defense;
        # our published packages rely on prepare / prepublishOnly to build before publish,
        # so we drop just that line and keep the registry override.
        run: sed -i '/^ignore-scripts[[:space:]]*=/d' "$HOME/.npmrc"
      - run: npm install -g corepack@latest && corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: |
            packages/blob/pnpm-lock.yaml
      - run: pnpm install
      - run: git config --global user.name machineuser
      - run: git config --global user.email infra+machineuser@huggingface.co
      - run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          BUMPED_VERSION=$(node -p "require('semver').inc('$PACKAGE_VERSION', '${{ github.event.inputs.newversion }}')")
          # Update package.json with the new version
          node -e "const fs = require('fs'); const package = JSON.parse(fs.readFileSync('./package.json')); package.version = '$BUMPED_VERSION'; fs.writeFileSync('./package.json', JSON.stringify(package, null, '\t') + '\n');"
          git commit . -m "🔖 @huggingface/blob $BUMPED_VERSION"
          git tag "blob-v$BUMPED_VERSION"
          echo "RELEASE_TAG=blob-v$BUMPED_VERSION" >> $GITHUB_ENV

      - run: (git pull --rebase && git push && git push origin "$RELEASE_TAG") || (git pull --rebase && git push && git push origin "$RELEASE_TAG")

      - run: pnpm publish --registry=https://registry.npmjs.org/ --no-git-checks .
      # hack - reuse actions/setup-node@v4 just to set a new registry
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://npm.pkg.github.com"

      - run: pnpm publish --no-git-checks .
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: "Update Doc"
        uses: peter-evans/repository-dispatch@v2
        with:
          event-type: doc-build
          token: ${{ secrets.BOT_ACCESS_TOKEN }}
      - name: Create GitHub Release
        run: gh release create "$RELEASE_TAG"
        working-directory: .
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
